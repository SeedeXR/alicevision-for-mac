site_name: AliceVision for Mac
site_description: Apple Silicon-native AliceVision + Meshroom photogrammetry pipeline
site_url: https://github.com/placeholder/alicevision-for-mac
repo_url: https://github.com/placeholder/alicevision-for-mac
repo_name: alicevision-for-mac
copyright: Copyright &copy; 2026 — MPL-2.0 licensed. Built on the AliceVision and Meshroom upstreams.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - User Guide:
    - user/install.md
    - user/pipeline.md
    - user/meshroom.md
    - user/segmentation.md
    - user/troubleshooting.md
  - Developer Guide:
    - dev/overview.md
    - dev/architecture.md
    - dev/build.md
    - dev/adding-kernel.md
    - dev/adapter.md
    - dev/perf.md
    - dev/segmentation-pipeline.md
    - dev/apple-silicon-optimization.md
    - dev/testing.md
  - Reference:
    - reference/binaries.md
    - reference/cmake-options.md
    - reference/kernels.md
    - reference/segmentation.md
    - reference/mental-notes.md
  - Release notes:
    - changelog.md
    - perf-history.md
